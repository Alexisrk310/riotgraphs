apiVersion: apps/v1
kind: Deployment
metadata:
  name: riotgraphs-app
  labels: { app: riotgraphs-app }
spec:
  replicas: 3
  selector: { matchLabels: { app: riotgraphs-app } }
  template:
    metadata: { labels: { app: riotgraphs-app } }
    spec:
      containers:
        - name: app
          image: ghcr.io/riotgraphs/app:latest
          ports: [{ containerPort: 3000 }]
          envFrom:
            - secretRef: { name: riotgraphs-secrets }
            - configMapRef: { name: riotgraphs-config }
          readinessProbe:
            httpGet: { path: /api/health, port: 3000 }
            initialDelaySeconds: 10
          livenessProbe:
            httpGet: { path: /api/health, port: 3000 }
            initialDelaySeconds: 30
          resources:
            requests: { cpu: 250m, memory: 512Mi }
            limits:   { cpu: 1000m, memory: 1Gi }
---
apiVersion: v1
kind: Service
metadata: { name: riotgraphs-app }
spec:
  selector: { app: riotgraphs-app }
  ports: [{ port: 80, targetPort: 3000 }]
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: riotgraphs-app }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: riotgraphs-app }
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata: { name: riotgraphs-app }
spec:
  minAvailable: 2
  selector: { matchLabels: { app: riotgraphs-app } }
