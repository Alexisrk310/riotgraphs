apiVersion: v1
kind: ConfigMap
metadata: { name: riotgraphs-config }
data:
  NODE_ENV: production
  NEXT_PUBLIC_APP_URL: "https://riotgraphs.com"
  LOG_LEVEL: "info"
---
apiVersion: v1
kind: Secret
metadata: { name: riotgraphs-secrets }
type: Opaque
stringData:
  DATABASE_URL: "postgresql://..."
  REDIS_URL: "redis://..."
  CLICKHOUSE_URL: "http://..."
  RIOT_API_KEY: "REPLACE_ME"
  NEXTAUTH_SECRET: "REPLACE_ME"
  STRIPE_SECRET_KEY: "REPLACE_ME"
  STRIPE_WEBHOOK_SECRET: "REPLACE_ME"
  ABACUS_API_KEY: "REPLACE_ME"
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: riotgraphs
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts: [riotgraphs.com]
      secretName: riotgraphs-tls
  rules:
    - host: riotgraphs.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: { service: { name: riotgraphs-app, port: { number: 80 } } }
